<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>和食 直 — 管理画面</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #c9a86a;
    --gold2:  #8a6b2a;
    --ink:    #0a0807;
    --ink2:   #0e0c0a;
    --ink3:   #1a1410;
    --cream:  #f4ece0;
    --mute:   #6a5836;
    --red:    #f87171;
    --green:  #34d399;
    --amber:  #fbbf24;
  }

  html, body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── ページ切り替え ── */
  .page { display: none !important; }
  #page-login.active    { display: flex  !important; }
  #page-dashboard.active { display: block !important; }
  #page-form.active     { display: block !important; }

  /* ── 共通 ── */
  .container { max-width: 480px; margin: 0 auto; padding: 0 16px 80px; }

  header.admin-header {
    background: var(--ink2);
    border-bottom: 1px solid rgba(201,168,106,.2);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .admin-header .title {
    font-size: 15px;
    letter-spacing: .08em;
    color: var(--gold);
  }
  .admin-header .logout-btn {
    font-size: 12px;
    color: var(--mute);
    background: none;
    border: 1px solid rgba(106,88,54,.4);
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 2px;
  }
  .admin-header .logout-btn:active { opacity: .7; }

  /* ── ログインページ ── */
  #page-login {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    background: var(--ink2);
    border: 1px solid rgba(201,168,106,.25);
    padding: 32px 24px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-logo .ja { font-size: 26px; letter-spacing: .1em; }
  .login-logo .gold { color: var(--gold); }
  .login-logo .sub { font-size: 11px; color: var(--mute); letter-spacing: .15em; margin-top: 4px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: .1em;
    margin-bottom: 7px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(74,62,42,.7);
    color: var(--cream);
    font-size: 15px;
    padding: 8px 0;
    outline: none;
    font-family: inherit;
    transition: border-color .2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-bottom-color: var(--gold);
  }
  .field input::placeholder, .field textarea::placeholder { color: #3a3228; }
  .field select option { background: var(--ink3); }
  .field textarea { resize: none; min-height: 60px; }

  .btn-primary {
    width: 100%;
    background: linear-gradient(180deg,#efdba8 0%,#d2b074 42%,#b58f4e 100%);
    color: #1a1310;
    border: none;
    padding: 14px;
    font-size: 14px;
    font-family: inherit;
    letter-spacing: .1em;
    cursor: pointer;
    font-weight: 600;
    transition: opacity .2s;
  }
  .btn-primary:active { opacity: .85; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--cream);
    border: 1px solid rgba(201,168,106,.3);
    padding: 12px 20px;
    font-size: 13px;
    font-family: inherit;
    letter-spacing: .08em;
    cursor: pointer;
    transition: border-color .2s;
  }
  .btn-secondary:hover { border-color: var(--gold); }

  .error-msg {
    color: var(--red);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
    min-height: 20px;
  }

  /* ── ダッシュボード ── */
  .date-bar {
    background: var(--ink3);
    border-bottom: 1px solid rgba(201,168,106,.15);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .date-bar .date-label { font-size: 14px; letter-spacing: .06em; }
  .date-bar .summary {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: .06em;
  }

  /* ── 統計カード ── */
  .stats-bar {
    background: var(--ink2);
    border-bottom: 1px solid rgba(201,168,106,.12);
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat-card {
    background: var(--ink3);
    border: 1px solid rgba(74,62,42,.4);
    padding: 10px 8px;
    text-align: center;
  }
  .stat-card .sc-label {
    font-size: 10px;
    color: var(--mute);
    letter-spacing: .08em;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-card .sc-value {
    font-size: 15px;
    color: var(--gold);
    letter-spacing: .04em;
    font-weight: 600;
    white-space: nowrap;
  }
  .stat-card .sc-compare {
    font-size: 10px;
    color: var(--mute);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-card .sc-compare.up   { color: var(--green); }
  .stat-card .sc-compare.down { color: var(--red); }

  /* ── タブバー ── */
  .tab-bar {
    display: flex;
    background: var(--ink2);
    border-bottom: 1px solid rgba(201,168,106,.15);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--mute);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: .1em;
    padding: 11px 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .section-title {
    font-size: 11px;
    color: var(--mute);
    letter-spacing: .15em;
    padding: 20px 0 10px;
    border-bottom: 1px solid rgba(74,62,42,.3);
    margin-bottom: 12px;
  }

  .reservation-card {
    background: var(--ink2);
    border: 1px solid rgba(74,62,42,.4);
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .reservation-card .rc-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .reservation-card .rc-name {
    font-size: 16px;
    letter-spacing: .06em;
  }
  .reservation-card .rc-party {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: .06em;
  }
  .reservation-card .rc-course {
    font-size: 12px;
    color: rgba(244,236,224,.6);
    margin-bottom: 4px;
  }
  .reservation-card .rc-allergy {
    font-size: 12px;
    color: var(--red);
    font-weight: 600;
  }
  .reservation-card .rc-note {
    font-size: 12px;
    color: rgba(244,236,224,.5);
  }
  .rc-source {
    font-size: 10px;
    letter-spacing: .08em;
    padding: 2px 7px;
    border: 1px solid;
    white-space: nowrap;
  }
  .rc-source.web   { color: var(--green); border-color: rgba(52,211,153,.3); }
  .rc-source.phone { color: var(--amber); border-color: rgba(251,191,36,.3); }

  .empty-state {
    text-align: center;
    color: var(--mute);
    font-size: 14px;
    padding: 40px 0;
    letter-spacing: .06em;
  }

  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: linear-gradient(180deg,#efdba8 0%,#d2b074 42%,#b58f4e 100%);
    color: #1a1310;
    border: none;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    font-size: 28px;
    line-height: 56px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
    z-index: 90;
  }

  /* ── 月間カレンダー ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    background: var(--ink2);
    border-bottom: 1px solid rgba(201,168,106,.1);
  }
  .cal-nav .cal-month-label {
    font-size: 14px;
    color: var(--cream);
    letter-spacing: .06em;
  }
  .cal-nav-btn {
    background: none;
    border: 1px solid rgba(201,168,106,.3);
    color: var(--gold);
    font-size: 16px;
    width: 30px;
    height: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .cal-nav-btn:active { opacity: .7; }

  .cal-grid {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .cal-grid th {
    font-size: 10px;
    color: var(--mute);
    text-align: center;
    padding: 6px 0 4px;
    letter-spacing: .06em;
    border-bottom: 1px solid rgba(74,62,42,.3);
  }
  .cal-grid th:first-child { color: var(--red); }
  .cal-grid th:last-child  { color: #60a5fa; }
  .cal-grid td {
    text-align: center;
    padding: 4px 2px;
    border: 1px solid rgba(74,62,42,.2);
    vertical-align: top;
    cursor: pointer;
    transition: background .15s;
  }
  .cal-grid td:hover { background: rgba(201,168,106,.08); }
  .cal-grid td.empty { cursor: default; background: transparent; }
  .cal-grid td.empty:hover { background: transparent; }
  .cal-grid td.cal-closed { opacity: .4; cursor: default; }
  .cal-grid td.cal-closed:hover { background: transparent; }
  .cal-grid td.cal-past { opacity: .5; }
  .cal-grid td.cal-selected { background: rgba(201,168,106,.15); outline: 1px solid var(--gold); }

  .cal-day-num {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
    display: block;
  }
  .cal-day-num.sun { color: var(--red); }
  .cal-day-num.sat { color: #60a5fa; }

  .cal-dot-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    margin-top: 2px;
  }
  .cal-count {
    font-size: 9px;
    line-height: 1.3;
    white-space: nowrap;
  }
  .cal-count.green  { color: var(--green); }
  .cal-count.amber  { color: var(--amber); }
  .cal-count.red    { color: var(--red); }
  .cal-count.gray   { color: var(--mute); }

  .cal-selected-header {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: .08em;
    padding: 14px 16px 8px;
    border-bottom: 1px solid rgba(74,62,42,.3);
  }

  /* ── 電話予約フォーム ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--mute);
    font-size: 13px;
    letter-spacing: .06em;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .back-btn svg { width: 16px; height: 16px; }

  /* 人数ボタングリッド */
  .party-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .party-btn {
    background: transparent;
    border: 1px solid rgba(74,62,42,.5);
    color: var(--cream);
    padding: 10px 0;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .party-btn.selected {
    background: rgba(201,168,106,.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* コースラジオ */
  .course-option { display: none; }
  .course-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid rgba(74,62,42,.5);
    padding: 12px 14px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color .15s, background .15s;
  }
  .course-option:checked + .course-label {
    border-color: var(--gold);
    background: rgba(201,168,106,.08);
  }
  .course-label .cn { font-size: 14px; }
  .course-label .cp { font-size: 12px; color: var(--gold); }

  /* 空席警告 */
  .availability-msg {
    font-size: 12px;
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 2px;
    display: none;
  }
  .availability-msg.warn {
    display: block;
    background: rgba(251,191,36,.1);
    border: 1px solid rgba(251,191,36,.3);
    color: var(--amber);
  }
  .availability-msg.full {
    display: block;
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    color: var(--red);
  }

  /* スピナー */
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(201,168,106,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 30px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink3);
    border: 1px solid rgba(201,168,106,.3);
    color: var(--cream);
    font-size: 13px;
    padding: 10px 20px;
    letter-spacing: .06em;
    z-index: 200;
    opacity: 0;
    transition: opacity .3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ══════════════════════════
     ログインページ
══════════════════════════ -->
<div id="page-login" class="page active">
  <div class="login-box">
    <div class="login-logo">
      <div class="ja">和食 <span class="gold">直</span></div>
      <div class="sub">ADMIN</div>
    </div>
    <div class="field">
      <label>メールアドレス</label>
      <input id="login-email" type="email" autocomplete="email" placeholder="owner@example.com">
    </div>
    <div class="field">
      <label>パスワード</label>
      <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="login-btn">ログイン</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ══════════════════════════
     ダッシュボード
══════════════════════════ -->
<div id="page-dashboard" class="page">
  <header class="admin-header">
    <span class="title">和食 直 — 管理</span>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </header>

  <div class="date-bar">
    <span class="date-label" id="today-label"></span>
    <span class="summary" id="today-summary"></span>
  </div>

  <!-- 統計カード -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card">
      <div class="sc-label">今月の売上</div>
      <div class="sc-value" id="stat-revenue">—</div>
      <div class="sc-compare" id="stat-revenue-cmp">—</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">累計客数</div>
      <div class="sc-value" id="stat-guests">—</div>
      <div class="sc-compare" id="stat-guests-cmp">—</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">平均客単価</div>
      <div class="sc-value" id="stat-avg">—</div>
      <div class="sc-compare" id="stat-avg-cmp">—</div>
    </div>
  </div>

  <!-- タブバー -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-today" data-tab="today">本日</button>
    <button class="tab-btn"        id="tab-month" data-tab="month">月間</button>
  </div>

  <!-- 本日ビュー -->
  <div id="view-today">
    <div class="container">
      <div class="section-title">本日の予約</div>
      <div id="reservation-list"><div class="spinner"></div></div>

      <div style="margin-top:24px">
        <button class="btn-primary" id="add-phone-btn" style="display:flex;align-items:center;justify-content:center;gap:8px">
          <span style="font-size:20px;line-height:1">＋</span>
          電話予約を登録する
        </button>
      </div>
    </div>
  </div>

  <!-- 月間ビュー -->
  <div id="view-month" style="display:none">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav-btn" id="cal-next">&#8250;</button>
    </div>
    <div style="padding:0 8px 8px">
      <table class="cal-grid" id="cal-table">
        <thead>
          <tr>
            <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
          </tr>
        </thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>
    <div class="cal-selected-header" id="cal-selected-header" style="display:none"></div>
    <div class="container" style="padding-top:8px">
      <div id="cal-reservation-list"></div>
    </div>
  </div>

  <!-- FAB（スクロール時用） -->
  <button class="fab" id="fab-btn" title="電話予約を追加">＋</button>
</div>

<!-- ══════════════════════════
     電話予約入力フォーム
══════════════════════════ -->
<div id="page-form" class="page">
  <header class="admin-header">
    <button class="back-btn" id="form-back-btn">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 4L6 10l6 6"/>
      </svg>
      戻る
    </button>
    <span class="title">電話予約登録</span>
    <span></span>
  </header>

  <div class="container" style="padding-top:20px">
    <div class="field">
      <label>予約日 *</label>
      <input id="f-date" type="date">
    </div>
    <div class="field">
      <label>お名前 *</label>
      <input id="f-name" type="text" placeholder="山田 花子">
    </div>
    <div class="field">
      <label>ふりがな</label>
      <input id="f-kana" type="text" placeholder="やまだ はなこ">
    </div>
    <div class="field">
      <label>電話番号 *</label>
      <input id="f-phone" type="tel" placeholder="090-0000-0000">
    </div>
    <div class="field">
      <label>人数 *</label>
      <div class="party-grid" id="party-grid">
        <button class="party-btn" data-v="1">1名</button>
        <button class="party-btn" data-v="2">2名</button>
        <button class="party-btn" data-v="3">3名</button>
        <button class="party-btn" data-v="4">4名</button>
        <button class="party-btn" data-v="5">5名</button>
        <button class="party-btn" data-v="6">6名</button>
        <button class="party-btn" data-v="7">7名</button>
        <button class="party-btn" data-v="8">8名</button>
      </div>
      <div class="availability-msg" id="avail-msg"></div>
    </div>
    <div class="field" style="margin-top:18px">
      <label>コース *</label>
      <div style="margin-top:8px">
        <input class="course-option" type="radio" name="course" id="c-half"      value="half">
        <label class="course-label" for="c-half">
          <span class="cn">特別ハーフコース</span>
          <span class="cp">¥6,500</span>
        </label>
        <input class="course-option" type="radio" name="course" id="c-omakase"   value="omakase">
        <label class="course-label" for="c-omakase">
          <span class="cn">店主のおまかせコース</span>
          <span class="cp">¥10,000</span>
        </label>
        <input class="course-option" type="radio" name="course" id="c-selection" value="selection">
        <label class="course-label" for="c-selection">
          <span class="cn">店主の厳選コース</span>
          <span class="cp">¥12,000</span>
        </label>
      </div>
    </div>
    <div class="field">
      <label>アレルギー・備考</label>
      <textarea id="f-notes" placeholder="えび、かに など" rows="3"></textarea>
    </div>

    <div style="margin-top:8px">
      <button class="btn-primary" id="form-submit-btn">予約を登録する</button>
      <div class="error-msg" id="form-error"></div>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- Supabase JS -->
<script src="supabase.js"></script>
<script>
const SUPABASE_URL  = 'https://johrztiitxndabamqwgi.supabase.co';

// 月間カレンダー状態

/* ── ページ切り替え ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

/* ── トースト ── */
function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

/* ── 日付フォーマット ── */
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00+09:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
}
function todayStr() {
  return new Date().toLocaleDateString('sv', { timeZone: 'Asia/Tokyo' });
}
function toLocalDateStr(date) {
  // Returns 'YYYY-MM-DD' in JST from a Date object
  return date.toLocaleDateString('sv', { timeZone: 'Asia/Tokyo' });
}

/* ── コース名 ── */
const COURSE = {
  half      : '特別ハーフコース',
  omakase   : 'おまかせコース',
  selection : '厳選コース',
};

/* ── 数値フォーマット ── */
function fmtYen(n) {
  if (n >= 10000) return `¥${(n / 10000).toFixed(1)}万`;
  return `¥${n.toLocaleString()}`;
}

/* ══════════════════════
   ダッシュボード
══════════════════════ */
async function loadDashboard() {
  const today = todayStr();

  // ヘッダーの日付
  document.getElementById('today-label').textContent = formatDate(today);

  const listEl = document.getElementById('reservation-list');
  listEl.innerHTML = '<div class="spinner"></div>';

  const { data, error } = await sb
    .from('reservations')
    .select(`
      id, reservation_date, party_size, course_type,
      allergies, notes, source, status,
      customers ( name, phone )
    `)
    .eq('reservation_date', today)
    .eq('status', 'confirmed')
    .order('id');

  if (error) {
    listEl.innerHTML = '<div class="empty-state">データ取得に失敗しました</div>';
  } else {
    const total = data.reduce((s, r) => s + r.party_size, 0);
    document.getElementById('today-summary').textContent =
      data.length ? `${data.length}組 ${total}名様` : '本日の予約なし';

    if (!data.length) {
      listEl.innerHTML = '<div class="empty-state">本日の予約はありません</div>';
    } else {
      listEl.innerHTML = data.map((r, i) => renderCard(r, i + 1)).join('');
    }
  }

  // 統計カードを非同期で読み込む
  loadStats();

  // 月間タブが表示中なら再描画
  if (calYear !== null) renderCalendar();
}

function renderCard(r, idx) {
  const num = idx !== undefined ? `${idx}. ` : '';
  return `
    <div class="reservation-card">
      <div class="rc-header">
        <span class="rc-name">${num}${r.customers?.name ?? '—'}</span>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="rc-party">${r.party_size}名様</span>
          <span class="rc-source ${r.source}">${r.source === 'web' ? 'WEB' : 'TEL'}</span>
        </div>
      </div>
      <div class="rc-course">${COURSE[r.course_type] ?? r.course_type}</div>
      ${r.allergies ? `<div class="rc-allergy">⚠ ${r.allergies}</div>` : ''}
      ${r.notes     ? `<div class="rc-note">${r.notes}</div>` : ''}
      ${r.customers?.phone ? `<div class="rc-note" style="margin-top:4px;color:var(--mute)">📞 ${r.customers.phone}</div>` : ''}
    </div>
  `;
}

/* ══════════════════════
   Feature 3: 統計カード
══════════════════════ */
async function loadStats() {
  const now = new Date();
  const jstNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const year  = jstNow.getFullYear();
  const month = jstNow.getMonth(); // 0-indexed

  const monthStart = `${year}-${String(month + 1).padStart(2, '0')}-01`;
  const nextMonth  = new Date(year, month + 1, 1);
  const monthEnd   = new Date(nextMonth - 1).toLocaleDateString('sv', { timeZone: 'Asia/Tokyo' });

  const prevYear       = year - 1;
  const prevMonthStart = `${prevYear}-${String(month + 1).padStart(2, '0')}-01`;
  const prevMonthEnd   = new Date(prevYear, month + 1, 0).toLocaleDateString('sv');

  // 今月データ
  const { data: thisData } = await sb
    .from('reservations')
    .select('party_size, course_type, status')
    .gte('reservation_date', monthStart)
    .lte('reservation_date', monthEnd)
    .eq('status', 'confirmed');

  // 前年同月データ
  const { data: prevData } = await sb
    .from('reservations')
    .select('party_size, course_type, status')
    .gte('reservation_date', prevMonthStart)
    .lte('reservation_date', prevMonthEnd)
    .eq('status', 'confirmed');

  function calcStats(rows) {
    if (!rows || !rows.length) return { revenue: 0, guests: 0, avg: 0 };
    let revenue = 0, guests = 0;
    for (const r of rows) {
      const price = PRICES[r.course_type] ?? 0;
      revenue += price * r.party_size;
      guests  += r.party_size;
    }
    return { revenue, guests, avg: guests > 0 ? Math.round(revenue / guests) : 0 };
  }

  const cur  = calcStats(thisData);
  const prev = calcStats(prevData);

  // 売上
  document.getElementById('stat-revenue').textContent = fmtYen(cur.revenue);
  document.getElementById('stat-revenue-cmp').textContent = compareStat(cur.revenue, prev.revenue);
  applyCompareClass('stat-revenue-cmp', cur.revenue, prev.revenue);

  // 客数
  document.getElementById('stat-guests').textContent = `${cur.guests}名`;
  document.getElementById('stat-guests-cmp').textContent = compareStat(cur.guests, prev.guests);
  applyCompareClass('stat-guests-cmp', cur.guests, prev.guests);

  // 平均客単価
  document.getElementById('stat-avg').textContent = cur.avg > 0 ? fmtYen(cur.avg) : '—';
  document.getElementById('stat-avg-cmp').textContent = compareStat(cur.avg, prev.avg);
  applyCompareClass('stat-avg-cmp', cur.avg, prev.avg);
}

function compareStat(cur, prev) {
  if (prev === 0) return '前年データなし';
  const pct = Math.round(((cur - prev) / prev) * 100);
  const sign = pct >= 0 ? '+' : '';
  return `前年同月比 ${sign}${pct}%`;
}

function applyCompareClass(elId, cur, prev) {
  const el = document.getElementById(elId);
  el.classList.remove('up', 'down');
  if (prev === 0) return;
  if (cur >= prev) el.classList.add('up');
  else el.classList.add('down');
}

/* ══════════════════════
   タブ切り替え
══════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const tab = btn.dataset.tab;

    document.getElementById('view-month').style.display = tab === 'month' ? '' : 'none';

    if (tab === 'month') {
      if (calYear === null) {
        const now = new Date();
        const jst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
        calYear  = jst.getFullYear();
        calMonth = jst.getMonth();
      }
      loadCalendarMonth();
    }
  });
});

/* ══════════════════════
   Feature 2: 月間カレンダー
══════════════════════ */
document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  calSelectedDate = null;
  loadCalendarMonth();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  calSelectedDate = null;
  loadCalendarMonth();
});

async function loadCalendarMonth() {
  document.getElementById('cal-month-label').textContent =
    `${calYear}年${calMonth + 1}月`;

  const monthStart = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-01`;
  const lastDay    = new Date(calYear, calMonth + 1, 0).getDate();
  const monthEnd   = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

  const { data, error } = await sb
    .from('reservations')
    .select('reservation_date, party_size, course_type, status')
    .gte('reservation_date', monthStart)
    .lte('reservation_date', monthEnd)
    .eq('status', 'confirmed');

  calMonthData = error ? [] : (data || []);
  renderCalendar();
}

function renderCalendar() {
  const today    = todayStr();
  const lastDay  = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDow = new Date(calYear, calMonth, 1).getDay(); // 0=Sun

  // Aggregate reservations by date
  const byDate = {};
  for (const r of calMonthData) {
    const ds = r.reservation_date;
    if (!byDate[ds]) byDate[ds] = { groups: 0, guests: 0 };
    byDate[ds].groups++;
    byDate[ds].guests += r.party_size;
  }

  // Build grid rows
  const MAX_SEATS = 20; // 定員（満席判定の基準）
  const AMBER_THRESHOLD = 0.7;

  let html = '';
  let day  = 1;
  let rowStarted = false;

  while (day <= lastDay) {
    html += '<tr>';
    for (let col = 0; col < 7; col++) {
      if (!rowStarted && col < firstDow) {
        html += '<td class="empty"></td>';
        continue;
      }
      rowStarted = true;
      if (day > lastDay) {
        html += '<td class="empty"></td>';
        continue;
      }

      const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const d       = new Date(dateStr + 'T00:00:00+09:00');
      const dow     = d.getDay(); // 0=Sun
      const isSun   = dow === 0;
      const isSat   = dow === 6;
      const isPast  = dateStr < today;
      const isClosed = isSun;
      const isSelected = dateStr === calSelectedDate;

      const info   = byDate[dateStr];
      const guests = info ? info.guests : 0;
      const groups = info ? info.groups : 0;
      const ratio  = guests / MAX_SEATS;

      let cellClass = '';
      if (isClosed) cellClass = 'cal-closed';
      else if (isPast) cellClass = 'cal-past';
      if (isSelected) cellClass += (cellClass ? ' ' : '') + 'cal-selected';

      let countClass = 'gray';
      let countHtml  = '';
      if (!isClosed && groups > 0) {
        if (ratio >= 1)              countClass = 'red';
        else if (ratio >= AMBER_THRESHOLD) countClass = 'amber';
        else                         countClass = 'green';
        countHtml = `<div class="cal-dot-row">
          <span class="cal-count ${countClass}">${groups}組</span>
          <span class="cal-count ${countClass}">${guests}名</span>
        </div>`;
      } else if (isClosed) {
        countHtml = `<div class="cal-dot-row"><span class="cal-count gray">休</span></div>`;
      }

      const numClass = isSun ? 'sun' : (isSat ? 'sat' : '');
      html += `<td class="${cellClass}" data-date="${dateStr}"${isClosed || cellClass.includes('closed') ? '' : ` onclick="selectCalDate('${dateStr}')"`}>
        <span class="cal-day-num ${numClass}">${day}</span>
        ${countHtml}
      </td>`;

      day++;
    }
    html += '</tr>';
  }

  document.getElementById('cal-body').innerHTML = html;

  // Show selected date's reservations
  if (calSelectedDate) {
    renderCalSelectedDate(calSelectedDate);
  } else {
    document.getElementById('cal-selected-header').style.display = 'none';
    document.getElementById('cal-reservation-list').innerHTML    = '';
  }
}

function selectCalDate(dateStr) {
  calSelectedDate = dateStr;
  renderCalendar();
  // Scroll to selected info
  setTimeout(() => {
    const hdr = document.getElementById('cal-selected-header');
    if (hdr) hdr.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

async function renderCalSelectedDate(dateStr) {
  const hdr    = document.getElementById('cal-selected-header');
  const listEl = document.getElementById('cal-reservation-list');

  hdr.style.display  = '';
  hdr.textContent    = formatDate(dateStr) + ' の予約';
  listEl.innerHTML   = '<div class="spinner"></div>';

  const { data, error } = await sb
    .from('reservations')
    .select(`
      id, reservation_date, party_size, course_type,
      allergies, notes, source, status,
      customers ( name, phone )
    `)
    .eq('reservation_date', dateStr)
    .eq('status', 'confirmed')
    .order('id');

  if (error) {
    listEl.innerHTML = '<div class="empty-state">データ取得に失敗しました</div>';
    return;
  }
  if (!data.length) {
    listEl.innerHTML = '<div class="empty-state">この日の予約はありません</div>';
    return;
  }
  listEl.innerHTML = data.map((r, i) => renderCard(r, i + 1)).join('');
}

/* ── Feature 1: 空席チェック ── */
let availCache = {};  // { 'YYYY-MM-DD': { available_seats, booked } }
let availCheckDebounce = null;

async function checkAvailability() {
  const date = document.getElementById('f-date').value;
  if (!date) return;

  const msgEl = document.getElementById('avail-msg');

  // Fetch availability row for this date
  const { data: avRow } = await sb
    .from('availability')
    .select('available_seats')
    .eq('date', date)
    .maybeSingle();

  // Also count already-confirmed reservations for that day
  const { data: existing } = await sb
    .from('reservations')
    .select('party_size')
    .eq('reservation_date', date)
    .eq('status', 'confirmed');

  const maxSeats   = avRow ? avRow.available_seats : 20;  // default 20 if no row
  const bookedSeats = (existing || []).reduce((s, r) => s + r.party_size, 0);
  const remaining  = maxSeats - bookedSeats;

  availCache[date] = { maxSeats, bookedSeats, remaining };

  updateAvailMsg(date);
}

function updateAvailMsg(date) {
  if (!date) return;
  const info = availCache[date];
  if (!info) return;

  const { remaining } = info;
  const msgEl = document.getElementById('avail-msg');

  if (remaining <= 0) {
    msgEl.className = 'availability-msg full';
    msgEl.textContent = 'この日は満席です';
    return;
  }

  if (selectedParty !== null && selectedParty > remaining) {
    msgEl.className = 'availability-msg full';
    msgEl.textContent = `残り${remaining}席です（${remaining}名以下でご選択ください）`;
    return;
  }

  if (remaining <= 4) {
    msgEl.className = 'availability-msg warn';
    msgEl.textContent = `残り${remaining}席です`;
    return;
  }

  msgEl.className = 'availability-msg';
  msgEl.style.display = 'none';
  msgEl.textContent = '';
}

// 人数ボタン
document.getElementById('party-grid').addEventListener('click', e => {
  const btn = e.target.closest('.party-btn');
  if (!btn) return;
  document.querySelectorAll('.party-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedParty = Number(btn.dataset.v);

  // 空席チェック（キャッシュあれば即時、なければフェッチ）
  const date = document.getElementById('f-date').value;
  if (date && availCache[date]) {
    updateAvailMsg(date);
  } else {
    checkAvailability();
  }
});

// 日付変更
document.getElementById('f-date').addEventListener('change', () => {
  const date = document.getElementById('f-date').value;
  availCache = {};  // キャッシュクリア
  const msgEl = document.getElementById('avail-msg');
  msgEl.className = 'availability-msg';
  msgEl.textContent = '';
  checkAvailability();
});

function resetForm() {
  document.getElementById('f-date').value  = todayStr();
  document.getElementById('f-name').value  = '';
  document.getElementById('f-kana').value  = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-notes').value = '';
  document.querySelectorAll('.party-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.course-option').forEach(r => r.checked = false);
  document.getElementById('form-error').textContent = '';
  const msgEl = document.getElementById('avail-msg');
  msgEl.className = 'availability-msg';
  msgEl.textContent = '';
  selectedParty = null;
  availCache = {};
  // 初期日付の空席チェック
  checkAvailability();
}

document.getElementById('form-submit-btn').addEventListener('click', async () => {
  const date   = document.getElementById('f-date').value;
  const name   = document.getElementById('f-name').value.trim();
  const kana   = document.getElementById('f-kana').value.trim();
  const phone  = document.getElementById('f-phone').value.trim();
  const notes  = document.getElementById('f-notes').value.trim();
  const course = document.querySelector('.course-option:checked')?.value;
  const errEl  = document.getElementById('form-error');
  const btn    = document.getElementById('form-submit-btn');

  // バリデーション
  if (!date || !name || !phone || !selectedParty || !course) {
    errEl.textContent = '※ 必須項目（日付・名前・電話・人数・コース）を入力してください';
    return;
  }

  // 空席チェック
  const info = availCache[date];
  if (info && info.remaining <= 0) {
    errEl.textContent = 'この日は満席のため登録できません';
    return;
  }
  if (info && selectedParty > info.remaining) {
    errEl.textContent = `残り${info.remaining}席のため${selectedParty}名での登録はできません`;
    return;
  }

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    // 顧客 UPSERT（電話番号で識別）
    const { data: customer, error: cErr } = await sb
      .from('customers')
      .upsert({ phone, name }, { onConflict: 'phone' })
      .select()
      .single();
    if (cErr) throw cErr;

    // 予約 INSERT
    const { error: rErr } = await sb
      .from('reservations')
      .insert({
        customer_id      : customer.id,
        reservation_date : date,
        party_size       : selectedParty,
        course_type      : course,
        notes            : notes || null,
        status           : 'confirmed',
        source           : 'phone',
      });
    if (rErr) throw rErr;

    toast('✅ 予約を登録しました');
    await loadDashboard();
    showPage('page-dashboard');

  } catch (err) {
    errEl.textContent = `エラー: ${err.message}`;
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '予約を登録する';
  }
});

/* ── 初期化 ── */
checkSession();
</script>
